<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chatsito — Dark Red (mejorado)</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="./img/JOMBY FOXO Cabeza.png" type="image/png">
  <style>
    :root{--bg-1:#050405; --bg-2:#0b0202; --bg-3:#170707;}
    html,body,#root{height:100%}
    body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
    .scrollbar-thin::-webkit-scrollbar{width:8px;height:8px}
    .scrollbar-thin::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:8px}
    .floating-alert{position:fixed;top:1.15rem;right:1.15rem;z-index:9999;max-width:340px;padding:.9rem 1.1rem;background:linear-gradient(180deg, rgba(255,255,255,0.17), rgba(255,255,255,0.08));border:1px solid rgba(255,255,255,.18);border-radius:1rem;box-shadow:0 16px 35px rgba(0,0,0,.35);color:#fff;font-weight:700;backdrop-filter:blur(10px);opacity:0;transform:translateY(-10px) scale(0.95);transition:opacity .35s,transform .35s,box-shadow .35s;pointer-events:none;text-align:center;line-height:1.4;font-size:0.95rem;}
    .floating-alert--show,.floating-alert-visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
    .floating-alert--show{box-shadow:0 18px 40px rgba(220,50,90,.45);}
    .glass{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));}
    #name-modal > div { border: 1px solid rgba(255, 255, 255, 0.28); box-shadow: 0 20px 40px rgba(0,0,0,.55); }
    #name-modal h3 { letter-spacing: 0.04em; text-shadow: 0 2px 12px rgba(255, 40, 100, .5); }
    #name-modal input { background: rgba(20, 10, 10, 0.85); border-color: rgba(255, 255, 255, 0.2); }
    #login-btn { border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 20px rgba(232, 63, 122, 0.35); }

  </style>
</head>

<body class="bg-gradient-to-br from-[var(--bg-1)] via-[var(--bg-2)] to-[var(--bg-3)] min-h-screen text-white">

  <div id="root" class="h-full flex items-center justify-center p-4">
    <div id="chat-app" class="w-full max-w-[1100px] h-full grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- SIDEBAR -->
      <aside id="sidebar"
             class="col-span-1 bg-[#0f0b0b] rounded-2xl shadow-2xl p-4 flex flex-col gap-4 md:static md:translate-x-0 fixed inset-y-0 left-0 z-40 w-[86%] max-w-xs transform -translate-x-full transition-transform duration-200 ease-in-out">
        <div class="flex items-center gap-3">
          <img id="user-img" class="w-12 h-12 rounded-full object-cover border-2 border-[#2c0808]" src="./img/sin-hogar.png" alt="avatar">
          <div class="flex-1 min-w-0">
            <div id="user-name" class="font-semibold text-lg truncate">Usuario</div>
            <div id="user-status" class="text-xs text-slate-400 truncate">offline</div>
          </div>
          <div class="flex flex-col items-end">
            <div id="online-count" class="text-sm text-rose-400 font-medium">0 online</div>
            <button id="config-btn" aria-label="Configuración" title="Configuración" class="mt-1 p-2 rounded-full hover:bg-[#2a0b0b]">
              <i class="fa-solid fa-gear text-rose-300"></i>
            </button>
          </div>
        </div>

        <div>
          <input id="search" type="search" placeholder="Buscar usuarios o mensajes" class="w-full bg-[#0b0b0b] text-sm rounded-full px-3 py-2 outline-none placeholder:text-slate-500">
        </div>

        <div class="flex-1 overflow-auto pr-2 mt-1 scrollbar-thin">
          <h4 class="text-xs text-slate-300 mb-2">Usuarios activos</h4>
          <div id="presence-list" class="flex flex-col gap-2"></div>
        </div>

        <div class="md:hidden">
          <button id="close-sidebar" class="w-full py-2 rounded-full bg-slate-700">Cerrar</button>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="col-span-2 bg-[#0a0707] rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <!-- header -->
        <div class="flex items-center gap-3 p-3 border-b border-[#260505]">
          <div class="md:hidden">
            <button id="open-sidebar" aria-label="Abrir menú" class="p-2 rounded-md bg-transparent hover:bg-[#120909]">
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>

          <div class="flex-1">
            <div id="typing" class="text-xs text-rose-400"></div>
          </div>
        </div>

        <!-- messages -->
        <div id="chat-box" class="flex-1 overflow-auto p-4 md:p-6 space-y-3 scrollbar-thin bg-gradient-to-b from-[#0d0606]/60 to-[#070202]/35">
        </div>

        <!-- composer -->
        <div class="p-3 md:p-4 border-t border-[#260505] flex items-center gap-2 md:gap-3">
          <button id="upload-btn" aria-label="Adjuntar" title="Adjuntar" class="rounded-full bg-[#1b0b0b] p-2 hover:bg-[#2a0b0b]">
            <i class="fa-solid fa-paperclip"></i>
          </button>
          <input id="image-file" type="file" accept="image/*" class="hidden">
          <input id="message" autocomplete="off" placeholder="Escribe un mensaje..." class="flex-1 bg-[#0b0b0b] rounded-full px-3 md:px-4 py-2 outline-none text-slate-100 text-sm md:text-base" />
          <button id="emoji-btn" aria-label="Emojis" class="text-xl md:text-2xl">😊</button>
          <button id="send-btn" class="bg-gradient-to-r from-rose-600 to-rose-500 px-3 md:px-4 py-2 rounded-full hover:from-rose-700 hover:to-rose-600 shadow text-sm md:text-base font-semibold">
            Enviar
          </button>
        </div>
      </main>

    </div>
  </div>

  <!-- name modal -->
  <div id="name-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-gradient-to-br from-[#120909] to-[#1a0d0d] rounded-3xl shadow-2xl p-6 w-[95%] max-w-2xl border border-rose-900/30">
      <div class="text-center mb-6">
        <h3 class="text-2xl md:text-3xl font-extrabold text-rose-400">Hola Machi</h3>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
        <div class="flex justify-center">
          <img src="./img/Saludito.png" alt="Mascota" class="w-40 md:w-60 drop-shadow-[0_10px_25px_rgba(244,63,94,0.4)]" />
        </div>

        <div class="flex flex-col gap-4 md:gap-5">
          <div class="relative">
            <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-rose-400"></i>
            <input id="name-input" placeholder="Tu super nombre" class="w-full pl-10 pr-3 py-2 rounded-xl bg-[#1a0d0d]/80 border border-rose-900/40 text-white outline-none" />
          </div>

          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-rose-400"></i>
            <input id="pass-input" type="password" placeholder="Clave que te di" class="w-full pl-10 pr-3 py-2 rounded-xl bg-[#1a0d0d]/80 border border-rose-900/40 text-white outline-none" />
          </div>

          <button id="login-btn" class="w-full py-2 md:py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-rose-600 to-rose-500 hover:from-rose-700 hover:to-rose-600 active:scale-95 transition shadow-lg">Entrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- config modal -->
  <div id="config-modal" class="hidden fixed inset-0 z-50 bg-black/60 flex items-center justify-center">
    <div class="bg-[#120909] rounded-xl w-[92%] max-w-md p-5">
      <div class="flex items-center gap-4 mb-4">
        <img id="config-avatar" class="w-14 h-14 rounded-full border" src="./img/sin-hogar.png" alt="avatar">
        <div class="flex-1">
          <div id="config-name" class="font-semibold text-white">Usuario</div>
          <div class="text-sm text-slate-400">Editar perfil</div>
        </div>
        <button id="close-config" aria-label="Cerrar configuración" class="text-slate-300">✖</button>
      </div>

      <label class="block text-slate-300 text-sm mb-1">Nombre</label>
      <input id="config-name-input" class="w-full mb-3 p-2 rounded bg-[#0b0b0b] outline-none text-white" />

      <label class="block text-slate-300 text-sm mb-1">Avatar</label>
      <input id="config-avatar-input" type="file" accept="image/*" class="w-full mb-3" />

      <div class="flex gap-2">
        <button id="save-config" class="flex-1 bg-rose-600 py-2 rounded hover:bg-rose-700">Guardar</button>
        <button id="logout" class="flex-1 bg-slate-700 py-2 rounded hover:bg-slate-600">Cerrar sesión</button>
      </div>
    </div>
  </div>

  <!-- emoji picker -->
  <emoji-picker id="emoji-picker" class="hidden fixed right-4 md:right-8 bottom-24 md:bottom-32 z-50"></emoji-picker>

  <!-- emoji webcomponent -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>

  <!-- main app script (external) -->
  <script type="module" src="./js/chat.js"></script>
</body>
</html>
